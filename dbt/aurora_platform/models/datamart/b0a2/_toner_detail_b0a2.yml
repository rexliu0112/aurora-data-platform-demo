version: 2

models:
  - name: toner_detail_b0a2
    description: B0A2 碳粉耗材明細（含分色更換量與天數）
    tests:
      - unique:
          column_name: "CONCAT(MARA, '|', MACNO, '|', CTNO, '|', DOCNO, '|', ITEM_MARA)"
          config:
            severity: warn
    columns:
      - name: MARA
        description: 機型
        tests:
          - not_null
      - name: MACNO
        description: 機號
        tests:
          - not_null
      - name: CTNO
        description: 合約編號
        tests:
          - not_null